options:
  do_ocr: false
sources:
  - kind: google_cloud_storage
    bucket: your-bucket-name
    key_prefix: source/
    project: my-gcp-project                          # optional (billing/ADC project)
    max_num_elements: 1                                # optional, no limit default
    service_account_key: 
      type: service_account
      project_id: my-gcp-project
      private_key_id: 2aca9ed8...
      private_key: "-----BEGIN PRIVATE KEY-----\nMIIEv...\n-----END PRIVATE KEY-----\n"
      client_email: my-sa@my-gcp-project.iam.gserviceaccount.com
      client_id: "111274397167470984881"
      auth_uri: https://accounts.google.com/o/oauth2/auth
      token_uri: https://oauth2.googleapis.com/token
      auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
      client_x509_cert_url: https://www.googleapis.com/robot/v1/metadata/x509/my-sa%40...
      universe_domain: googleapis.com

target:
  kind: google_cloud_storage
  bucket: your-bucket-name
  key_prefix: target/
  project: my-gcp-project
  service_account_key:
    type: service_account
    project_id: my-gcp-project
    private_key_id: 2aca9ed8...
    private_key: "-----BEGIN PRIVATE KEY-----\nMIIEv...\n-----END PRIVATE KEY-----\n"
    client_email: my-sa@my-gcp-project.iam.gserviceaccount.com
    client_id: "111274397167470984881"
    auth_uri: https://accounts.google.com/o/oauth2/auth
    token_uri: https://oauth2.googleapis.com/token
    auth_provider_x509_cert_url: https://www.googleapis.com/oauth2/v1/certs
    client_x509_cert_url: https://www.googleapis.com/robot/v1/metadata/x509/my-sa%40...
    universe_domain: googleapis.com